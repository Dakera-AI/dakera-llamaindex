name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: read

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: Integration (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    services:
      dakera:
        image: ghcr.io/dakera-ai/dakera:latest
        credentials:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        env:
          DAKERA_AUTH_ENABLED: "false"
          DAKERA_ROOT_API_KEY: test-key
          DAKERA_HOST: "0.0.0.0"
          DAKERA_PORT: "3300"
        ports:
          - 3300:3300
        options: >-
          --health-cmd "curl -f http://localhost:3300/health || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 15s

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Wait for Dakera
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3300/health; then
              echo "Dakera is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Dakera failed to start"
          exit 1

      - name: Run integration tests
        env:
          DAKERA_API_URL: http://localhost:3300
        run: pytest tests/ -v --tb=short -m "integration or not unit_only"

  examples:
    name: Examples
    continue-on-error: true
    needs: integration
    runs-on: ubuntu-latest

    services:
      dakera:
        image: ghcr.io/dakera-ai/dakera:latest
        credentials:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        env:
          DAKERA_AUTH_ENABLED: "false"
          DAKERA_ROOT_API_KEY: test-key
          DAKERA_HOST: "0.0.0.0"
          DAKERA_PORT: "3300"
        ports:
          - 3300:3300
        options: >-
          --health-cmd "curl -f http://localhost:3300/health || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 15s

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Wait for Dakera
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3300/health; then
              echo "Dakera is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Dakera failed to start"
          exit 1

      - name: Run examples
        env:
          DAKERA_API_URL: http://localhost:3300
          DAKERA_API_KEY: test-key
        run: |
          python examples/basic_memory.py
          python examples/advanced_memory.py
          python examples/batch_operations.py
          python examples/hybrid_search.py
          python examples/knowledge_graph.py
          python examples/rag_pipeline.py
          python examples/sessions.py
